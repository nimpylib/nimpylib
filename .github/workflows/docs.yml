name: docs

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - master
    tags:
      - v*.*
  workflow_dispatch:

env:
  git-url-arg: --git.url:https://github.com/${{ github.repository }} --git.commit:master
  deploy-dir: .gh-pages
  lib-deploy-dir: .gh-pages/Lib
jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
    - uses: actions/checkout@v4
    - uses: nimpylib/doc-deploy@v0.1.3
      with:
        homepage: https://docs.nimpylib.org
        proj-name: pylib
        deploy-dir: ${{ env.deploy-dir }}
        nimble-doc-cmd: |
          nimble testDoc --index:on --project ${{ env.git-url-arg }} --outdir:${{ env.deploy-dir }} -d:homepage="${{ github.event.repository.homepage }}"
          nimble testLibDoc ${{ env.git-url-arg }} --outdir:${{ env.lib-deploy-dir }}
