[changelog]
body = """
{% if version %}
# [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
# [unreleased]
{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
{% if group == "Features" %}
## 🚀 Features
{% elif group == "Bug Fixes" %}
## 🐛 Bug Fixes
{% elif group == "Performance" %}
## ⚡ Performance
{% elif group == "Refactor" %}
## 🚜 Refactor
{% elif group == "Documentation" %}
## 📚 Documentation
{% elif group == "Miscellaneous Tasks" %}
## ⚙️ Miscellaneous Tasks
{% else %}
## 💼 Other
{% endif %}

{% for scope, scoped_commits in commits | group_by(attribute="scope") %}
{% if scope %}
### {{ scope | upper_first }} {% endif %}
{% for commit in scoped_commits %}
- {{ commit.message | split(pat="\n") | first }} ({{ commit.id | truncate(length=7, end="") }}){% endfor %}
{% endfor %} {% endfor %}
"""
trim = true
render_always = true

[git]
conventional_commits = true
filter_unconventional = false
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "Features", default_scope = "feature" },
  { message = "^fix", group = "Bug Fixes", default_scope = "fix" },
  { message = "^perf", group = "Performance", default_scope = "performance" },
  { message = "^refactor", group = "Refactor", default_scope = "refactor" },
  { message = "^docs?", group = "Documentation", default_scope = "documentation" },
  { message = "^(chore|ci|test|build)", group = "Miscellaneous Tasks", default_scope = "misc" },
  { message = "^revert", skip = true },
  { message = ".*", group = "Other", default_scope = "other" },
]